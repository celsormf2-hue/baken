<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 105" width="400" height="105" role="img" aria-label="Baken Construtora">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;900&amp;display=swap');
    </style>
  </defs>

  <!-- ══════════════════════════════════════════
       ÍCONE  — Quadrado vermelho com monograma BA
       ══════════════════════════════════════════ -->
  <g id="icon-mark">

    <!-- Fundo quadrado vermelho com cantos arredondados -->
    <rect x="2" y="2" width="101" height="101" rx="11" ry="11" fill="#EF3340"/>

    <!-- Frame interno branco (borda retangular) -->
    <rect x="12" y="12" width="81" height="81" rx="7" ry="7"
          fill="none" stroke="#FFFFFF" stroke-width="4"/>

    <!-- ── Letra B (branco, metade esquerda) ──────────────── -->
    <!-- Barra vertical -->
    <rect x="20" y="21" width="7" height="63" rx="2" ry="2" fill="#FFFFFF"/>

    <!-- Bojo superior do B -->
    <path d="M27,21 H41
             C56,21 56,52 41,52
             H27 Z"
          fill="#FFFFFF"/>

    <!-- Bojo inferior do B (ligeiramente maior) -->
    <path d="M27,52 H43
             C60,52 60,84 43,84
             H27 Z"
          fill="#FFFFFF"/>

    <!-- ── Letra A (branco, metade direita) ───────────────── -->
    <!-- Haste esquerda da A (polígono diagonal) -->
    <polygon points="60,84 66,84 78,21 72,21" fill="#FFFFFF"/>

    <!-- Haste direita da A (polígono diagonal) -->
    <polygon points="72,21 78,21 90,84 84,84" fill="#FFFFFF"/>

    <!-- Travessão horizontal da A -->
    <rect x="65" y="56" width="20" height="5" rx="1" fill="#FFFFFF"/>

  </g>

  <!-- ══════════════════════════════════════════
       LOGOTIPO — Texto BAKEN + CONSTRUTORA
       ══════════════════════════════════════════ -->
  <g id="logotype" transform="translate(116, 0)">

    <!-- BAKEN -->
    <text
      x="0" y="74"
      font-family="'Montserrat', 'Arial Black', 'Helvetica Neue', Arial, sans-serif"
      font-weight="900"
      font-size="68"
      fill="#EF3340"
      letter-spacing="1">BAKEN</text>

    <!-- CONSTRUTORA -->
    <text
      x="2" y="96"
      font-family="'Montserrat', Arial, 'Helvetica Neue', sans-serif"
      font-weight="500"
      font-size="15.5"
      fill="#EF3340"
      letter-spacing="6">CONSTRUTORA</text>

  </g>

</svg>
